<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />

  <style>
    :root {
      color-scheme: dark;
      --overlay: rgba(0, 0, 0, 0.62);
      --surface: rgba(18, 18, 20, 0.78);
      --text: #f5f5f7;
      --muted: #d0d0d3;
      --cta: #8c6bff;
      --ctaHover: #9f82ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #000;
      color: var(--text);
    }
    .page {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: grid;
      place-items: center;
      padding: 16px;
      isolation: isolate;
    }
    .bgVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, var(--overlay), var(--overlay));
      z-index: -2;
    }
    main {
      width: min(100%, 980px);
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 18px;
      backdrop-filter: blur(8px);
      display: grid;
      gap: 14px;
      box-shadow: 0 10px 45px rgba(0, 0, 0, 0.35);
      max-height: calc(100dvh - 32px);
    }
    h1 {
      margin: 0;
      line-height: 1.15;
      font-size: clamp(1.4rem, 2.3vw, 2.4rem);
      text-wrap: balance;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(0.92rem, 1.35vw, 1.06rem);
      line-height: 1.45;
    }
    .videoWrap {
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      overflow: hidden;
    }
    .videoWrap video {
      width: 100%;
      display: block;
      max-height: min(42dvh, 380px);
      object-fit: cover;
      background: #0a0a0a;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .cta {
      appearance: none;
      border: 0;
      border-radius: 999px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 20px;
      font-weight: 700;
      color: white;
      background: var(--cta);
      transition: background .2s ease;
    }
    .cta:hover { background: var(--ctaHover); }
    .secondary {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.24);
      color: white;
    }
    .srOnly {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
    @media (max-width: 640px) {
      main {
        border-radius: 16px;
        padding: 14px;
      }
      .actions .cta {
        flex: 1 1 auto;
      }
    }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Service",
    "serviceType": "Video memorial personalizado",
    "provider": {
      "@type": "Organization",
      "name": "Memoriales Celestiales",
      "url": "/"
    },
    "areaServed": "MX",
    "availableChannel": {
      "@type": "ServiceChannel",
      "serviceUrl": "/"
    }
  }
  </script>
</head>
<body>
  <div class="page">
    <video class="bgVideo" autoplay muted loop playsinline preload="metadata" aria-hidden="true">
      <source src="/media/background.webm" type="video/webm" />
      <source src="/media/background.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
    <main>
      <header>
        <h1>Honra su memoria con un video memorial personalizado</h1>
        <p>Entrega en 24 horas. Atención por WhatsApp. Compra segura en pocos minutos.</p>
      </header>

      <section class="videoWrap" aria-labelledby="explicacionTitulo">
        <h2 id="explicacionTitulo" class="srOnly">Video explicativo del servicio</h2>
        <video controls preload="metadata" playsinline poster="/media/poster-explicacion.jpg">
          <source src="/media/explicacion.webm" type="video/webm" />
          <source src="/media/explicacion.mp4" type="video/mp4" />
          Tu navegador no soporta video HTML5.
        </video>
      </section>

      <div class="actions">
        <a class="cta" href="/comprar" aria-label="Comprar ahora">Comprar ahora</a>
        <a class="cta secondary" href="https://wa.me/5210000000000" rel="noopener noreferrer" target="_blank" aria-label="Hablar por WhatsApp">Hablar por WhatsApp</a>
      </div>
    </main>
  </div>
</body>
</html>
