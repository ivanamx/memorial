- Tras entregar el video corregido: marca `revision_incluida_usada: true` y **vuelve a enviar** el mismo bloque de opciones 1 / 2 (si aprueba → ETAPA 12; si pide otro cambio → ver siguiente bloque)

**Si cliente responde "2" y `revision_incluida_usada` = true** (ya usó la revisión incluida):

**Bot:**
```
