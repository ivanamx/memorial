## 📊 RESUMEN COMPLETO DE DATOS A CAPTURAR

**Esquema en PostgreSQL:** la definición canónica de tablas, tipos ENUM y columnas (incluye `revision_incluida_usada` en `ordenes` y `stripe_checkout_session_id` / `stripe_payment_intent_id` en `pagos`) está en **`script_database.sql`**. Lo de abajo es la lista lógica alineada al flujo.

### **1. INFORMACIÓN DEL CLIENTE (tabla: clientes)**
- `nombre_completo` (VARCHAR 255, NOT NULL)
- `whatsapp` (VARCHAR 10, NOT NULL) - Sin guiones
- `ciudad` (VARCHAR 100)
- `requiere_atencion_personal` (BOOLEAN) - Incluye: "NO" al inicio, palabra **ayuda** (cualquier mayúsculas), falló teléfono 3 veces, extras ambiguos persistentes, fallo enlace Stripe, **cambio extra** tras revisión incluida (ETAPA 11 opción 2 cuando `revision_incluida_usada`), etc.

**Sesión / bot (recomendado — pueden vivir en `clientes`, en la **orden** activa, o en tabla `conversaciones`):**
- `orden_activa_id` (INTEGER, FK NULL) - Orden **`borrador`** / `pago_pendiente` en curso para ese WhatsApp (tras timeout y borrado, **NULL** hasta nueva orden)
- `etapa_actual` (VARCHAR) - Paso en curso (reanudar si no pasaron 24 h; tras borrado por inactividad, resetear al nuevo flujo)
- `bot_pausado` (BOOLEAN) - `true` mientras un humano atiende; `false` con **`CONTINUAR BOT`**
- `intentos_validacion_telefono` (INTEGER) - Reiniciar al validar teléfono o al nueva sesión
- `ultima_actividad_cliente_at` (TIMESTAMP) - Actualizar en **cada** mensaje del cliente (**24 h** de inactividad)
- `cerrada_por_inactividad_at` (TIMESTAMP, NULL) - Evitar doble envío del mensaje de cierre si usas cron

### **2. INFORMACIÓN DEL DIFUNTO (tabla: ordenes)**
- `nombre_difunto` (VARCHAR 255, NOT NULL)
- `relacion_difunto` (VARCHAR 100) - madre, padre, etc.
- `fecha_fallecimiento` (DATE, NOT NULL)
- `fecha_nacimiento` (DATE, NULL) - NULL si "NO SE"

### **3. PAQUETE Y SERVICIOS (tabla: ordenes)**
- `paquete` (VARCHAR 50) - Siempre "unico"
- `servicio_qr` (BOOLEAN DEFAULT false)
- `servicio_ingles` (BOOLEAN DEFAULT false)
- `servicio_express` (BOOLEAN DEFAULT false)
- `precio_base` (DECIMAL 10,2) - Siempre 800.00
- `precio_servicios_adicionales` (DECIMAL 10,2)
- `precio_final` (DECIMAL 10,2, NOT NULL)

### **4. FOTOS Y MEDIOS (tabla: archivos)**
- `orden_id` (INTEGER, FK)
- `tipo_archivo` (VARCHAR 50) - "foto", "audio", "video", etc.
- `nombre_original` (VARCHAR 255)
- `nombre_almacenado` (VARCHAR 255) - Nombre único en disco del servidor
- `url_archivo` (TEXT, NOT NULL) - **Ruta en el servidor** (absoluta o relativa al volumen de medios) **o** URL servida por tu propio host; el binario **no** va dentro de PostgreSQL (solo referencia + metadatos)
- `mime_type`, `extension`, `tamano_bytes`, `almacenamiento_origen` (p. ej. `servidor_local`) según `script_database.sql`
- `orden_visualizacion` (INTEGER) - Para ordenar en el video
- Contador en `ordenes`: `numero_fotos` (INTEGER)

### **5. MENSAJE HABLADO (tabla: ordenes)**
- `tiene_audio_referencia` (BOOLEAN)
- `audio_referencia_url` (TEXT) - Ruta en servidor o URL propia del audio/video de referencia (misma política que `archivos`)
- `mensaje_voz_texto` (TEXT) - Texto del mensaje a clonar
- `usa_voz_profesional` (BOOLEAN) - Si eligió opción A sin audio
- `sin_voz` (BOOLEAN) - Si eligió opción B

### **6. MÚSICA (tabla: ordenes)**
- `estilo_musica` (VARCHAR 50) - "clasica_celestial", "instrumental_suave", "religiosa", "otro"
- `estilo_musica_otro` (TEXT) - Si eligió "otro"

### **7. TEXTO ESPECIAL (tabla: ordenes)**
- `texto_especial` (TEXT, NULL) - NULL si dijo "NO"

### **8. ESTILO VISUAL (tabla: ordenes)**
- `estilo_visual` (VARCHAR 50) - "clasico_elegante", "moderno_minimalista", "religioso_espiritual", "natural_jardin"

### **9. PAGO (tabla: pagos)**
- `orden_id` (INTEGER, FK)
- `metodo_pago` (VARCHAR 80) - Tipo/método según Stripe (ej. `card`, `oxxo`, etc.); lo tomas del webhook / PaymentIntent
- `monto` (DECIMAL 10,2, NOT NULL)
- `referencia_pago` (VARCHAR 255) - Número de orden / referencia interna (MC-…)
- `stripe_checkout_session_id` (VARCHAR 255, NULL) - Si aplica
- `stripe_payment_intent_id` (VARCHAR 255, NULL) - Si aplica
- `estado_pago` (VARCHAR 50) - "pendiente", "completado"
- `fecha_pago` (TIMESTAMP)

*(No se pide comprobante por WhatsApp, la acreditación es por webhook de Stripe.)*

### **10. ENTREGA (tabla: ordenes)**
- `fecha_orden` (TIMESTAMP DEFAULT CURRENT_TIMESTAMP)
- `fecha_entrega_estimada` (TIMESTAMP)
- `fecha_entrega_real` (TIMESTAMP)
- `url_video_final` (TEXT)
- `estado_orden` (VARCHAR 50) - Ver script SQL; incluye **`borrador`** (captura paso a paso hasta pago), **`pago_pendiente`** (link Stripe enviado, esperando webhook), luego producción/entrega. **Timeout 24 h:** borrar orden solo si **aún no pagó** (no tocar órdenes ya pagadas o en producción).

### **11. REVISIÓN (tabla: ordenes)**
- `aprobado` (BOOLEAN)
- `revision_solicitada` (BOOLEAN)
- `cambios_solicitados` (TEXT)
- `revision_incluida_usada` (BOOLEAN DEFAULT false) - `true` después de **entregar** al cliente la versión corregida bajo la 1 revisión gratuita del paquete

### **12. TESTIMONIO (tabla: testimonios)**
- `cliente_id` (INTEGER, FK)
- `orden_id` (INTEGER, FK)
- `testimonio_texto` (TEXT)
- `testimonio_google` (BOOLEAN)
- `sin_testimonio` (BOOLEAN)
- `created_at` (TIMESTAMP)

*(No se captura `autoriza_publicacion` en el flujo: testimonios escritos casi anónimos, sin esa pregunta en el bot.)*

### **13. AUDITORÍA (todas las tablas)**
- `created_at` (TIMESTAMP DEFAULT CURRENT_TIMESTAMP)
- `updated_at` (TIMESTAMP DEFAULT CURRENT_TIMESTAMP)
- `deleted_at` (TIMESTAMP) - Soft delete

