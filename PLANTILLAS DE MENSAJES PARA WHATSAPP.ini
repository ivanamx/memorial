## 🔄 FLUJO CONVERSACIONAL COMPLETO

### **ETAPA 1: PRIMER CONTACTO**

**Bot:**
```
Hola! Gracias por contactar a Memoriales Celestiales 🕊️

Creamos videos memoriales hermosos con IA que preservan 
la memoria de tus seres queridos para siempre.

Compra en 5 minutos. Si en algún momento necesitas ayuda, 
escribe la palabra ayuda (ayuda, Ayuda, AYUDA, como prefieras) 
y te atenderemos personalmente.
Contesta estas preguntas, paga y recibe. 

Responde SI o NO para continuar o salir (cualquier formato: sí, Sí, si, NO, no, etc.).
```

**Lógica:**
- **Ayuda** (palabra clave, **cualquier mayúsculas**: ayuda, AYUDA, Ayuda…) → Pausa bot + escalación (ver sección **AYUDA, escalación automática y CONTINUAR BOT**); mismo tratamiento en **cualquier etapa**
- Respuesta **afirmativa** (SÍ) → Aplica **normalización global SÍ/NO** → Continúa con ETAPA 2
- Respuesta **negativa** (NO) → Aplica **normalización global SÍ/NO** → Marca `requiere_atencion_personal: true`, `bot_pausado: true` en BD y notifica para contacto manual (opcional: seguimiento en 24–48 h). Reanudación solo si en el futuro retoma conversación con **CONTINUAR BOT** (si aplica) o contacto manual sin bot

**Bot (si responde NO):**
```
Entendido, gracias por escribirnos.

Si más adelante deseas un memorial o tienes dudas, 
aquí estaremos. Que tengas un buen día 🕊️
```

---

### **ETAPA 2: INFORMACIÓN BÁSICA DEL CLIENTE**

**Bot:**
```
Perfecto! Empecemos

1️⃣ ¿Cuál es tu nombre completo?
```

**Cliente:** "Juan Pérez García"

**Bot:**
```
Mucho gusto, Juan.

2️⃣ Confirma tu número de teléfono con WhatsApp. (ej.7221234567)
```

**Validación:**
- Debe ser exactamente 10 dígitos
- Acepta formatos: `7221234567`, `722-123-4567`, `722 123 4567`
- En BD siempre se guarda sin guiones ni espacios: `7221234567`
- Si no es válido (menos o más de 10 dígitos) → Incrementa `intentos_validacion_telefono` (sesión/bot) y repite pregunta 2

**Bot (teléfono inválido, intentos 1 y 2):**
```
El número debe tener 10 dígitos (solo números). 
Ejemplos válidos: 7221234567 o 722-123-4567.

2️⃣ Por favor confirma tu número otra vez:
```

**Lógica (después de 3 intentos fallidos):**
- Marca `requiere_atencion_personal: true`, `bot_pausado: true`
- `etapa_actual` sigue en **pregunta 2 (teléfono)** hasta que el asesor corrija y reanude
- Notifica al equipo

**Bot (teléfono inválido, intento 3):**
```
No logramos validar el número automáticamente.

Un asesor te escribirá en breve por este chat para ayudarte. 
Gracias por tu paciencia 🕊️
```
- **Pausa** el bot hasta que un asesor envíe **`CONTINUAR BOT`**, entonces se reenvía la pregunta 2 (o la que corresponda si ya actualizaste el teléfono en BD y avanzaste `etapa_actual`)

**Cliente:** "722-123-4567" o "7221234567"

**Bot:**
```
Perfecto!

3️⃣ ¿En qué ciudad te encuentras?
```

**Cliente:** "Toluca"

