## 🤖 PARA LA IA / EQUIPO QUE IMPLEMENTE EL BOT (léelo antes de codificar)

### Artefactos canónicos en este proyecto
- **`script_database.sql`** — tablas, ENUMs, triggers; al **borrar una orden** (timeout 24 h, etc.): primero `pagos`, luego `testimonios`, luego `ordenes` (RESTRICT; está explicado al inicio del SQL).
- **`.env.example`** — Stripe (claves + `STRIPE_PRICE_ID_*` paquete y extras), PostgreSQL, Meta WhatsApp, `PUBLIC_URL` (webhooks), `MEDIA_STORAGE_PATH`, `BOT_INACTIVITY_HOURS`, `GOOGLE_BUSINESS_REVIEW_URL`, alertas opcionales.

### Reglas de negocio fijas (canon)
- **Servicios adicionales:** solo **QR lápida**, **versión en inglés** y **entrega express** (ETAPA 4 y **`ESTRUCTURA DE PRECIOS - MEMORIAL.ini`**). No se ofrecen USB ni video extendido en ningún canal.
- **Revisiones:** el paquete incluye **1 revisión gratuita** (`revision_incluida_usada` en BD); revisiones adicionales van con humano y pago si aplica (ETAPA 11).

### Comportamiento técnico que el documento asume pero no detalla paso a paso
- **Stripe:** validar firma del webhook; **idempotencia** por `event.id` (no duplicar “pago recibido” ni mensajes al cliente). Si activas OXXO u otros asíncronos, manejar eventos de “pago completado tarde” además de `checkout.session.completed`.
- **Meta WhatsApp:** verificación GET del webhook con `WHATSAPP_VERIFY_TOKEN`; en POST validar **`X-Hub-Signature-256`** con `WHATSAPP_APP_SECRET`.
- **Duplicados:** Meta puede reenviar el mismo mensaje/webhook; el código debe tolerar **reprocesar de forma segura** (p. ej. por `messages[].id` o tabla de eventos procesados).
- **Checkout caducado:** Si `etapa_actual` es `esperando_pago_stripe` y la sesión ya expiró, definir si se **regenera link** automáticamente, se pide al cliente que escriba algo, o se escala.
- **Quién puede enviar `CONTINUAR BOT`:** Idealmente solo el **número de negocio / asesor** (no tratar como comando si un cliente casual escribe la misma frase), o usar un panel interno.
- **Límites de medios WhatsApp:** tamaño máximo de imagen/audio/video entrante y del **video final** HD; si no cabe como archivo, enviar **enlace** (URL firmada o descarga) en lugar de adjunto.
- **Notificar al equipo:** Este flujo dice “notificar” en varios puntos; falta especificar **canal concreto** (correo, Slack, ticket, dashboard) y plantilla mínima del aviso (teléfono, `orden_id`, `etapa_actual`, motivo).

### Detalle de copy opcional
- En **ETAPA 12**, un cierre menciona “tu madre” como ejemplo, en producción conviene **sustituir por datos reales** de la orden (`relacion_difunto` / nombre del ser querido) para no sonar incorrecto.

