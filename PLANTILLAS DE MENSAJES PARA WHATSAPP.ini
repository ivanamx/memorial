### **ETAPA 5: FOTOS**

**Bot:**
```
Perfecto!

9️⃣ Por favor, envíame hasta 15 fotos una por una o en grupos.

Pueden ser:
• Fotos antiguas (las restauramos)
• Fotos recientes
• Fotos de diferentes etapas de su vida

Tómate tu tiempo. Cuando termines, escribe "LISTO" 
```

**Lógica:**
- Acepta hasta **15** fotos por orden (paquete)
- **Almacenamiento (servidor + base de datos):** el **archivo binario** (bytes de la imagen) se guarda en **disco del propio servidor** (carpeta configurada en el backend, p. ej. variable `MEDIA_STORAGE_PATH` en `.env`). En PostgreSQL, la tabla **`archivos`** guarda **metadatos y la referencia**: `nombre_original`, `nombre_almacenado` (nombre único en disco), **`url_archivo`**: ruta absoluta en el servidor **o** URL HTTPS que tu API/servidor web sirve para ese archivo (misma máquina o volumen montado). **No** es obligatorio usar S3 ni nube externa.
- Contador de fotos recibidas (`numero_fotos` en `ordenes`)
- Audios de referencia (ETAPA 6) y otros medios: **misma política** (disco servidor + fila en `archivos` o campo `audio_referencia_url` apuntando a esa ruta/URL)
- Espera mensaje **LISTO** (normalizar: listo, LISTO, Listo) para continuar

**Si escribe LISTO y aún no hay ninguna foto (`numero_fotos` = 0):**

**Bot:**
```
Aún no recibimos fotos. Necesitamos al menos 1 para armar el memorial.

Por favor envía tus fotos (hasta 15). Cuando termines, escribe LISTO.
```

**Si envía más de 15 fotos:**
- Guarda solo las **primeras 15** en orden de llegada (o las que el cliente indique si pide reemplazar, si no, las primeras 15)
- Notifica al cliente

**Bot:**
```
Ya recibimos 15 fotos, que es el máximo incluido en tu paquete. 
Las fotos extra no se incluirán en el video a menos que pidas 
reemplazar alguna (escríbenos cuáles quitar y cuáles dejar).

Cuando esté conforme con el set de hasta 15, escribe LISTO.
```

**Si escribe LISTO con entre 1 y 15 fotos:** → Continúa a ETAPA 6

**Cliente:** [Envía 12 fotos]

**Cliente:** "LISTO"

