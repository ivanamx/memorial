### **ETAPA 4: PAQUETE Y SERVICIOS ADICIONALES**

**Bot:**
```
Gracias por compartir esto conmigo.

Tenemos un paquete único:

PAQUETE ÚNICO: $800 MXN
-----------------------
✓ Video memorial 4-5 minutos
✓ Hasta 15 fotos restauradas con AI
✓ Música personalizada
✓ Narración profesional de oraciones seleccionadas
✓ 1 foto hablando (mensaje 20 seg)
✓ Voz clonada si hay audio
✓ Entrega en 24 horas
✓ 1 revisión incluida
✓ Versión HD + versión WhatsApp

SERVICIOS ADICIONALES:
---------------------
1. Código QR para lápida: +$200
2. Versión en inglés: +$200
3. Entrega express (6 horas): +$300

8️⃣ Todo esto incluye el paquete. ¿Ocupas algún servicio adicional?
(Responde: NO, para continuar sin servicios adicionales, en caso de ocupar alguno responde con el número(s) del servicio adicional)
```

**Lógica de precios:**
- "NO" → Precio final = $800
- "1" → Precio final = $1,000 (`servicio_qr: true`)
- "2" → Precio final = $1,000 (`servicio_ingles: true`)
- "3" → Precio final = $1,100 (`servicio_express: true`)
- "1,2" o "1 2" → Precio final = $1,200 (QR + inglés)
- "1,3" o "1 3" → Precio final = $1,300 (QR + express)
- "2,3" o "2 3" → Precio final = $1,300 (inglés + express)
- "1,2,3" o "1 2 3" → Precio final = $1,500 (todos)

**Normalización de respuesta (antes de aplicar precios):**
- Para la palabra **NO** (sin extras): aplica **normalización global SÍ/NO** (`no`, `NO`, `No`, `nO`, etc.)
- También como “sin extras”: `ninguno`, `ninguna`, `0` (solo si es mensaje claro en contexto pregunta 8)
- Si escribe solo el nombre del servicio ("el QR", "inglés", "express") → mapea al número correspondiente (1, 2, 3)
- Separa números por coma, espacio o "y" (ej. "1 y 2", "1, 2")

**Si la respuesta es ambigua** (ej. solo "sí", "todos", "los tres" sin contexto claro, o números fuera de 1–3 mezclados con texto ilegible):

**Bot:**
```
Para dejarlo claro en tu orden: ¿quieres algún servicio adicional?

• Responde NO si no ocupas ninguno
• O escribe los números que sí quieres: 1 (QR lápida), 2 (inglés), 3 (express)

Ejemplos: NO  |  1  |  2  |  3  |  1,2  |  1,3  |  2,3  |  1,2,3
```
- Tras 2 aclaraciones sin respuesta válida → `requiere_atencion_personal: true`, `bot_pausado: true`, notificación; mensaje de escalación (mismo tono que teléfono). Reanudación con **`CONTINUAR BOT`** por el asesor desde `etapa_actual` (pregunta 8)

**Cliente:** "NO" o "1" o "1,3" etc.

