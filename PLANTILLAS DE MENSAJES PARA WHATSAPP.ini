# 📱 FLUJO DE WHATSAPP COMPLETO - MEMORIALES CELESTIALES
## Versión: flujo punta a punta (validaciones y ramas cerradas)

---

## 🆘 AYUDA, escalación automática y CONTINUAR BOT (protocolo único)

### **Qué hace el sistema**

1. **El bot guarda** `etapa_actual` (ej. `pregunta_2_telefono`, `pregunta_8_extras`, `esperando_pago_stripe`, etc.).

   **Flujo normal (sin humano):** cuando el cliente responde **bien**, el programa **guarda los datos** y **adelanta** `etapa_actual` al **siguiente** paso. Así el bot “sabe” que una etapa terminó: **porque el código ya movió el puntero** al recibir una respuesta válida. No hace falta adivinar leyendo 20 columnas.

   **Tras escalación humana:** regla **simple**: el asesor deja **completos** en BD los datos del paso que falló (o lo que haya corregido) y pone **`etapa_actual` = la siguiente pregunta** donde debe continuar el cliente (o la misma, si quieres que el bot **vuelva a preguntar** ese paso). Luego **`CONTINUAR BOT`**: el bot **solo lee** `etapa_actual` y envía **esa** pregunta o mensaje. **No** hace falta un “recálculo mágico” desde todas las columnas.

   Mientras `bot_pausado: true`, los mensajes del cliente **no** deben avanzar el flujo automático (los lee el asesor). La excepción es si quieres seguir aceptando la palabra **ayuda** (en **cualquier mayúsculas**: `ayuda`, `AYUDA`, `Ayuda`…) para reenviar la notificación al equipo.

2. **Pausa del bot** (`bot_pausado: true`): el flujo **no** envía más preguntas automáticas en ese chat hasta que un asesor reanude. Así no se encima el bot encima de lo que escribes tú.

3. **Reanudación:** cuando el asesor termina de atender, **escribe en ese mismo chat la frase exacta `CONTINUAR BOT`** (puede ir sola o al final de un mensaje al cliente; lo importante es que el sistema la detecte y la quite del texto visible si tu herramienta lo permite).

4. **Efecto de `CONTINUAR BOT`:** `bot_pausado: false`, `requiere_atencion_personal: false`, y el bot **envía la pregunta o paso que indique `etapa_actual`** (el valor que quedó en BD **después** de que el asesor ajustó datos y, si aplica, **adelantó** `etapa_actual` al siguiente paso).

---

### **Cliente escribe la palabra ayuda (en cualquier momento del flujo)**

**Prioridad máxima:** Antes de interpretar SÍ/NO, números u otra cosa, si el mensaje es la palabra **ayuda** en **cualquier formato de mayúsculas** (`ayuda`, `AYUDA`, `Ayuda`, `aYuDa`, etc.), aplica pausa y escalación. Tras **trim** y pasar a **minúsculas** debe quedar exactamente `ayuda` (sin tilde en español; si alguien escribe `áyuda`, normalizar sin acento también).

**Opcional (más flexible):** si la **primera palabra** del mensaje es `ayuda` (ej. `ayuda por favor`, `AYUDA no entiendo`), también escalar — solo si así lo configuras, para no confundir frases largas que solo mencionen “ayuda” en medio.

**Lógica:**
- `bot_pausado: true`
- `requiere_atencion_personal: true`
- Notificar al equipo (mismo criterio que en otros casos)
- **No borrar** `etapa_actual` (sigue valiendo para después)

**Bot:**
```
Listo. Un asesor te atenderá por aquí en un momento.

Escribe con calma lo que necesitas y te respondemos personalmente 🕊️
```

*(No menciones `CONTINUAR BOT` al cliente; es instrucción interna del equipo.)*

---

### **Escalación automática + pausa** (igual comportamiento que AYUDA)

Ocurre cuando el propio flujo se “atasca” y ya definimos que pasa a humano, por ejemplo:

- Teléfono inválido **3 veces**
- Extras del paquete **ambigüos** tras reintentos
- Fallo al crear **enlace o sesión de pago** en Stripe (y similar)
- Otras líneas del documento que digan `requiere_atencion_personal: true`

En todos esos casos: **`bot_pausado: true`**, notificación, y el mensaje al cliente que ya figura en esa rama. **Reanudación:** igual → el asesor escribe **`CONTINUAR BOT`** cuando corresponda.

---

### **Asesor: cómo reactivar el bot**

1. Atiende al cliente y, si hace falta, **corrige en PostgreSQL** los datos del paso en conflicto (ej. teléfono, extras).
2. En BD, pon **`etapa_actual` en el siguiente paso** del flujo donde debe continuar (ej. si arreglaste la pregunta 2, deja `etapa_actual` en **pregunta 3**). Si quieres que el bot **repita** la misma pregunta, **no** adelantes `etapa_actual`.
3. Envía **`CONTINUAR BOT`** (frase exacta; puedes tratar mayúsculas/minúsculas como con AYUDA si lo implementas insensible).
4. El bot **lee `etapa_actual` y envía solo esa pregunta o mensaje**.

**Resumen:** humano arregla datos + **ajusta `etapa_actual` al siguiente paso** (o deja el mismo) → **`CONTINUAR BOT`** → el bot continúa **desde esa etapa**. Simple, sin recalcular desde todas las columnas.

**Tip:** Puedes escribir primero algo humano y luego la frase, por ejemplo:  
`Perfecto Juan, ya quedó tu número. CONTINUAR BOT`  
Si tu plataforma no puede ocultar la frase, usa una redacción natural y que el cliente entienda que “seguimos con el formulario” en el mensaje siguiente automático.

---

### **Persistencia: paso a paso + estado borrador**

- **Cuándo crear filas (evita datos inventados en `ordenes`):** Tras **ETAPA 2** (nombre, teléfono, ciudad) creas o actualizas el registro en **`clientes`**. La fila en **`ordenes`** la creas **cuando ya tengas** lo mínimo del esquema para difunto (p. ej. al terminar **ETAPA 3**: nombre del ser querido, relación, fechas). `precio_final` puedes guardarlo en ese `INSERT` como **800** (base) y **actualizarlo en ETAPA 4** al elegir extras. Antes de eso **no** hace falta orden; solo cliente + `etapa_actual` en sesión.
- **Guardado:** Cada vez que el cliente da una **respuesta válida**, persistes en BD (UPDATE de **cliente** y/o **orden** y tablas relacionadas: `archivos`, etc.). Así no se pierde avance si WhatsApp falla o el usuario vuelve antes de 24 h.
- **Estado de la orden** mientras **no** hay pago confirmado: **`borrador`** (o equivalente en tu enum: captura de datos + espera de pago con link Stripe). Tras webhook de pago → pasa a **`pago_recibido`** / **`en_produccion`** según tu modelo.
- **Mientras no se cumplan las 24 h** de inactividad: si el cliente escribe de nuevo, **continúa la misma sesión** desde `etapa_actual` (misma orden borrador / `pago_pendiente`, según lo que uses para “ya mandé link y espero Stripe”).

---

### **Timeout por inactividad (24 horas)**

- **Regla:** Si pasan **24 horas** sin ningún **mensaje entrante del cliente** en esa conversación ligada a la orden activa, aplica **cierre por inactividad** (en **cualquier** punto del flujo **antes** de tener pago completado).
- **Actualización:** En **cada** mensaje del cliente, actualiza `ultima_actividad_cliente_at`.

**¿Cómo se ejecuta?** Típicamente **cron** y/o **al recibir un mensaje**: si `ahora - ultima_actividad_cliente_at` supera 24 h, primero ejecutas el cierre (abajo) y **luego** tratas el mensaje actual como **nuevo inicio** (ETAPA 1).

**Al cumplirse el timeout (orden aún sin pago completado):**

1. Envía **una vez** el mensaje de cierre al cliente.  
2. **Elimina** de BD la **orden** borrador (y lo necesario en cascada o en orden: `archivos`, filas de `pagos` en **pendiente** si existen, etc.). **No** borres órdenes que ya tengan pago completado o estén en producción.  
3. Opcional: si el **cliente** solo tenía esa orden y quieres historial limpio, puedes borrar también el registro de `clientes`; si prefieres conservar teléfono para futuras compras, borra solo la orden y deja el cliente (tu implementación).  
4. Resetea en memoria/sesión: sin `orden_id` activo, `etapa_actual` vacío o equivalente hasta crear **nueva** orden al retomar.  
5. **Próximo mensaje** del cliente: el bot arranca **como conversación nueva** (mensaje de **ETAPA 1** / primer contacto) y se crea una **orden nueva** en **`borrador`** cuando el flujo lo defina.

**Bot (una sola vez al cerrar por inactividad):**
```
Cerramos esta conversación por inactividad. 
Cuando quieras un memorial, escríbenos de nuevo por aquí 🕊️
```

- **No** obligues a una palabra fija; **cualquier** mensaje nuevo inicia de nuevo el flujo de bienvenida.

**Si NO se cumplen las 24 h:** el cliente retoma **la misma orden** y **`etapa_actual`**; el bot **continúa donde se quedó**.

---

## ✅ Normalización global de respuestas (mayúsculas, tildes y variantes)

**Regla:** En **todas** las preguntas del flujo que esperan **SÍ** o **NO** (y equivalentes), el bot **no** debe fallar por mayúsculas, minúsculas o tilde. Aplica lo mismo a otras palabras clave repetidas (**NO SE**, **LISTO**, letras de menú).

### **AYUDA** (escalación — misma palabra, cualquier mayúsculas)

- **Sí cuenta igual:** `ayuda`, `AYUDA`, `Ayuda`, `aYUDA`, etc. → todo es la misma palabra clave tras **trim** + **minúsculas** (y quitar acento en `áyuda` si aparece).
- **No** exijas que el cliente escriba solo en mayúsculas: lo que importa es reconocer **ayuda** de forma insensible a mayúsculas.
- Orden de evaluación sugerido en cada mensaje entrante: **0)** ¿pasaron **24 h** sin actividad? → cierre por inactividad, **borrar** orden sin pago, mensaje al cliente; luego tratar este mensaje como **nuevo inicio**. **1)** ¿es **AYUDA** normalizada? → escalación. **2)** ¿es **CONTINUAR BOT** (asesor)? → reanudar. **3)** resto del flujo (SÍ/NO, etc.).

### **SÍ / NO — algoritmo recomendado**

1. **Trim:** quitar espacios, saltos y puntos finales sueltos al inicio/final del mensaje.
2. **Normalizar para comparar:** pasar a minúsculas y quitar acentos/diacríticos (ej. `SÍ`, `Si`, `sí`, `SI`, `sÍ` → `si`; `No`, `NO`, `nO` → `no`). En código suele usarse Unicode NFD + filtrar marcas, o equivalencias explícitas.
3. **Afirmativo (cuenta como SÍ)** si, tras normalizar, el mensaje es **exactamente** una de estas formas (o equivalente ya normalizado):
   - `si`, `s` (solo la letra **s** y nada más)
   - Opcional si el mensaje es **muy corto** (1–2 palabras) y el contexto es sí/no: `ok`, `oka`, `vale`, `claro`, `sip`, `yes`
4. **Negativo (cuenta como NO)** si es exactamente:
   - `no`, `n` (solo la letra **n** y nada más)
   - Opcional corto: `nop`, `nel`, `noup`
5. Si el mensaje es **largo** o mezcla (“sí pero…”) y no encaja en lo anterior → **no** forzar SÍ/NO; usar la plantilla de “no entendí” de esa etapa.

**Dónde aplica esta regla:** ETAPA 1 (SI/NO inicial), pregunta de **audio** (¿tienes grabación?), **texto especial** (NO sin texto), **resumen** ¿todo correcto?, **¿corregir algo más?** (SÍ/NO), y cualquier otra pregunta binaria que añadas.

### **NO SE** (fecha de nacimiento, pregunta 7)

Tras trim + minúsculas + sin acentos, tratar como “no sabe la fecha” si coincide con: `no se` / `no sé` (misma forma normalizada), `nose`, `no lo se`, `desconozco`, `no tengo el dato`, o variantes con mayúsculas (`NO SE`, `No sé`, etc.).

### **LISTO** (envío de fotos)

Aceptar: `listo`, `LISTO`, `Listo`, `lista`, `LISTA`, `ya`, `ya está` (si es mensaje corto y claro en ese paso).

### **Letras de menú (A, B, G, etc.)**

Normalizar a mayúscula única: `a`, `A`, ` opción b ` → **B**. Ignorar espacios extra.

### **Números (1, 2, 3…)**

Trim y quitar espacios internos opcionales, aceptar `1`, `01`, a veces `1.` según implementación.

