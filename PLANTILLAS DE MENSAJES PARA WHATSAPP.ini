1 Si ya está perfecto y lo apruebas
2 Si quieres un cambio extra.

```
- **1** → Marca `estado_orden: "entregado"`, `aprobado: true` (aceptación tácita) → ETAPA 12
- **2** → `requiere_atencion_personal: true`, `bot_pausado: true` (revisión **adicional**, la atiende un **humano** de inicio a fin)

#### **Revisión adicional (humano + pago si aplica + CONTINUAR BOT)**

Tras **2** (cambio extra, ya sin revisión gratuita):

1. **Asesor / producción** atiende por WhatsApp o internamente: valora el cambio, acuerda costo si corresponde y, si hay cobro, genera y envía **nuevo link de pago Stripe** (misma lógica de webhook que el pago inicial). Registra el pago en `pagos` vinculado a la orden.
2. El **editor** hace los ajustes, **vuelve a enviar el video** al cliente por WhatsApp (fuera o dentro del flujo automático, según tu operación).
3. Cuando el cliente deba **volver a decidir** sobre el video (aprobar o plantear otro tema), el **humano** actualiza en BD **`etapa_actual`** al identificador correcto — en la práctica, el mismo paso que **ETAPA 11** (mensaje de “revísalo… opción 1 perfecto / 2 cambio”) o el que definas.
4. El asesor escribe **`CONTINUAR BOT`**. El bot **lee `etapa_actual`** y **reenvía al cliente** ese bloque (p. ej. otra vez las opciones 1 y 2 sobre el video entregado).
5. A partir de ahí el **cliente** responde con el bot **normal** (si elige **1** → ETAPA 12, si **2** otra vez → de nuevo escalación humana según tu política).

*(No hace falta un comando tipo “COTIZACIÓN” en el chat si todo lo resuelve el humano y el pago va por Stripe como arriba.)*

**Si la respuesta no es clara** (ni 1 ni 2):

**Bot:**
```
Para ayudarte rápido, responde con el número:

1 Si ya está perfecto y lo apruebas
2 Si quieres otro cambio extra.
```

